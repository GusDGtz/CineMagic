spring.application.name=CineMagic
server.port=${PORT:8080}
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialec
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=truet
logging.level.org.hibernate.SQL=debug
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
jwt.secret=ClaveMuyMuySeguraMuySecretaQueDebeSerMayorA256BitsPorEstandarYSiNoDaError
jwt.expiration=3600000
