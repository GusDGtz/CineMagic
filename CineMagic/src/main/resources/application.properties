spring.application.name=CineMagic
server.port=${PORT:8080}
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=debug
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
jwt.secret=ClaveMuyMuySeguraMuySecretaQueDebeSerMayorA256BitsPorEstandarYSiNoDaError
jwt.expiration=3600000
# Esto ayuda a que Swagger entienda d\u00f3nde est\u00e1n sus propios archivos
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.path=/swagger-ui.html
# Usa el nombre del paquete que aparece hasta arriba de tus archivos .java
springdoc.packages-to-scan=com.metaphorce.CineMagic